<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patil's Abacus Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #e8f5e9;
    font-family: 'Nunito', sans-serif;
  }

  .poster {
    width: 480px;
    background: linear-gradient(160deg, #e8f5e9 0%, #f0fdf4 40%, #fef9c3 100%);
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    position: relative;
    padding-bottom: 0;
  }

  /* Decorative corner elements */
  .deco {
    position: absolute;
    opacity: 0.18;
    font-size: 48px;
  }
  .deco-tl { top: 12px; left: 12px; transform: rotate(-15deg); }
  .deco-tr { top: 12px; right: 12px; transform: rotate(15deg); }

  /* Header */
  .header {
    padding: 32px 28px 18px;
    text-align: center;
    position: relative;
    z-index: 2;
  }

  /* Letter tiles */
  .title-tiles {
    display: flex;
    justify-content: center;
    gap: 7px;
    margin-bottom: 10px;
  }

  .tile {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fredoka One', cursive;
    font-size: 26px;
    color: #fff;
    box-shadow: 0 4px 0 rgba(0,0,0,0.18);
    animation: pop 0.5s ease both;
  }
  .tile:nth-child(1) { background: #ef5350; animation-delay: 0.05s; }
  .tile:nth-child(2) { background: #42a5f5; animation-delay: 0.1s; }
  .tile:nth-child(3) { background: #66bb6a; animation-delay: 0.15s; }
  .tile:nth-child(4) { background: #ffa726; animation-delay: 0.2s; }
  .tile:nth-child(5) { background: #ab47bc; animation-delay: 0.25s; }
  .tile:nth-child(6) { background: #26c6da; animation-delay: 0.3s; }

  @keyframes pop {
    0% { transform: scale(0.5) translateY(10px); opacity: 0; }
    80% { transform: scale(1.1); }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  .academy-name {
    font-family: 'Fredoka One', cursive;
    font-size: 15px;
    letter-spacing: 3px;
    color: #5c35a0;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .brand-name {
    font-family: 'Fredoka One', cursive;
    font-size: 28px;
    color: #2e7d32;
    line-height: 1.1;
    margin-bottom: 2px;
  }

  .brand-sub {
    font-size: 13px;
    color: #558b2f;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 0;
  }

  /* Divider */
  .divider {
    height: 3px;
    margin: 14px 28px;
    background: linear-gradient(90deg, #ef5350, #ffa726, #66bb6a, #42a5f5, #ab47bc);
    border-radius: 99px;
  }

  /* Body content */
  .content {
    padding: 0 30px;
    text-align: center;
  }

  .admission-badge {
    display: inline-block;
    background: linear-gradient(135deg, #5c35a0, #7e57c2);
    color: #fff;
    font-family: 'Fredoka One', cursive;
    font-size: 19px;
    letter-spacing: 0.5px;
    padding: 10px 28px;
    border-radius: 50px;
    margin-bottom: 14px;
    box-shadow: 0 4px 16px rgba(92,53,160,0.25);
    animation: fadeUp 0.6s 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .tagline {
    font-size: 14.5px;
    color: #4a4a4a;
    font-weight: 600;
    line-height: 1.6;
    margin-bottom: 16px;
    animation: fadeUp 0.6s 0.65s ease both;
  }

  /* Mode pills */
  .modes {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
    animation: fadeUp 0.6s 0.75s ease both;
  }

  .mode-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 18px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.3px;
  }

  .mode-pill.online {
    background: #e3f2fd;
    color: #1565c0;
    border: 2px solid #90caf9;
  }

  .mode-pill.offline {
    background: #e8f5e9;
    color: #2e7d32;
    border: 2px solid #a5d6a7;
  }

  .mode-pill .icon { font-size: 16px; }

  /* Age highlight */
  .age-block {
    background: linear-gradient(135deg, #fff8e1, #fffde7);
    border: 2.5px solid #ffd54f;
    border-radius: 16px;
    padding: 13px 22px;
    margin-bottom: 18px;
    animation: fadeUp 0.6s 0.85s ease both;
  }

  .age-label {
    font-size: 12px;
    color: #f57f17;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .age-value {
    font-family: 'Fredoka One', cursive;
    font-size: 26px;
    color: #e65100;
    letter-spacing: 1px;
  }

  /* Contact */
  .contact {
    background: linear-gradient(135deg, #5c35a0, #7e57c2);
    margin: 0 -30px;
    padding: 14px 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    animation: fadeUp 0.6s 1s ease both;
  }

  .contact-icon { font-size: 20px; }

  .contact-text {
    color: #fff;
    font-size: 14px;
    font-weight: 700;
  }

  .contact-number {
    color: #ffd54f;
    font-family: 'Fredoka One', cursive;
    font-size: 20px;
    letter-spacing: 1px;
  }

  .wa-badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    margin-left: 14px;
    animation: waPulse 2s ease-in-out infinite;
  }

  .wa-text {
    color: #25D366;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.5px;
    background: #fff;
    border-radius: 50px;
    padding: 1px 7px;
  }

  @keyframes waPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  .contact:hover {
    filter: brightness(1.1);
    cursor: pointer;
  }

  /* Kids image area */
  .kids-section {
    height: 200px;
    background: linear-gradient(180deg, #fef9c3 0%, #c8e6c9 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .kids-illustration {
    display: flex;
    gap: 16px;
    align-items: flex-end;
    padding: 0 20px;
  }

  /* Simple kids SVG illustration */
  .kid { text-align: center; animation: sway 3s ease-in-out infinite; }
  .kid:nth-child(2) { animation-delay: 0.5s; }
  .kid:nth-child(3) { animation-delay: 1s; }

  @keyframes sway {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }

  .abacus-row {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    height: 32px;
    background: #388e3c;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  .bead {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    margin: 0 3px;
  }

  .floating-nums {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 32px;
    pointer-events: none;
  }

  .fnum {
    position: absolute;
    font-family: 'Fredoka One', cursive;
    opacity: 0.15;
    animation: floatUp 4s ease-in-out infinite;
    color: #2e7d32;
  }

  @keyframes floatUp {
    0%, 100% { transform: translateY(0); opacity: 0.12; }
    50% { transform: translateY(-10px); opacity: 0.22; }
  }
</style>
</head>
<body>
<div class="poster">
  <span class="deco deco-tl">🧮</span>
  <span class="deco deco-tr">✏️</span>

  <div class="header">
    <!-- Letter tiles -->
    <div class="title-tiles">
      <div class="tile">A</div>
      <div class="tile">B</div>
      <div class="tile">A</div>
      <div class="tile">C</div>
      <div class="tile">U</div>
      <div class="tile">S</div>
    </div>

    <div class="academy-name">Patil's</div>
    <div class="brand-name">Abacus &amp; Basic<br>Math's Classes</div>
    <div class="brand-sub">🌟 Excellence in Mental Math 🌟</div>
  </div>

  <div class="divider"></div>

  <div class="content">
    <div class="admission-badge">🎉 Admission Open!</div>

    <div class="tagline">
      Your child will play with numbers<br>instead of struggling with them
    </div>

    <div class="modes">
      <div class="mode-pill online">
        <span class="icon">💻</span> Online

      <div class="mode-pill offline">

      <span class="fnum" style="top:15%;left:50%;font-size:32px;animation-delay:1.6s">×</span>
      <span class="fnum" style="top:50%;right:20%;font-size:30px;animation-delay:0.4s">3</span>
      <span class="fnum" style="top:25%;right:10%;font-size:26px;animation-delay:1.2s">=</span>

    <div class="kids-illustration">

        <line x1="40" y1="85" x2="45" y2="125" stroke="#1565c0" stroke-width="8" stroke-linecap="round"/>
      </svg>

      <!-- Abacus icon -->
      <svg width="80" height="100" viewBox="0 0 80 100" style="margin-bottom:30px">
        <rect x="5" y="5" width="70" height="90" rx="6" fill="#8d6e63" stroke="#5d4037" stroke-width="2"/>
        <!-- rods -->
        <line x1="40" y1="10" x2="40" y2="90" stroke="#5d4037" stroke-width="2"/>
        <!-- beads row 1 -->
        <circle cx="18" cy="25" r="9" fill="#ef5350"/>
        <circle cx="32" cy="25" r="9" fill="#ef5350"/>
        <circle cx="55" cy="25" r="9" fill="#ef5350"/>
        <!-- beads row 2 -->
        <circle cx="18" cy="48" r="9" fill="#ffa726"/>
        <circle cx="55" cy="48" r="9" fill="#ffa726"/>
        <circle cx="65" cy="48" r="9" fill="#ffa726"/>
        <!-- beads row 3 -->
        <circle cx="18" cy="71" r="9" fill="#66bb6a"/>
        <circle cx="32" cy="71" r="9" fill="#66bb6a"/>
        <circle cx="48" cy="71" r="9" fill="#66bb6a"/>
        <circle cx="63" cy="71" r="9" fill="#66bb6a"/>
      </svg>

      <!-- Kid 2 -->
      <svg class="kid" width="70" height="130" viewBox="0 0 70 130" style="animation-delay:0.7s">
        <circle cx="35" cy="22" r="18" fill="#FFAB91"/>
        <ellipse cx="35" cy="8" rx="18" ry="10" fill="#ffd54f"/>
        <circle cx="28" cy="22" r="3" fill="#fff"/><circle cx="29" cy="22" r="1.5" fill="#333"/>
        <circle cx="42" cy="22" r="3" fill="#fff"/><circle cx="43" cy="22" r="1.5" fill="#333"/>
        <path d="M29 30 Q35 36 41 30" stroke="#e65100" stroke-width="2" fill="none" stroke-linecap="round"/>
        <rect x="20" y="40" width="30" height="45" rx="8" fill="#ab47bc"/>
        <line x1="20" y1="50" x2="5" y2="75" stroke="#FFAB91" stroke-width="7" stroke-linecap="round"/>
        <line x1="50" y1="50" x2="65" y2="75" stroke="#FFAB91" stroke-width="7" stroke-linecap="round"/>
        <line x1="30" y1="85" x2="25" y2="125" stroke="#37474f" stroke-width="8" stroke-linecap="round"/>
        <line x1="40" y1="85" x2="45" y2="125" stroke="#37474f" stroke-width="8" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="abacus-row">
      <div class="bead" style="background:#ef5350"></div>
      <div class="bead" style="background:#ffa726"></div>
      <div class="bead" style="background:#ffee58"></div>
      <div class="bead" style="background:#66bb6a"></div>
      <div class="bead" style="background:#42a5f5"></div>
      <div class="bead" style="background:#ab47bc"></div>
      <div class="bead" style="background:#ef5350"></div>
      <div class="bead" style="background:#ffa726"></div>
      <div class="bead" style="background:#66bb6a"></div>
      <div class="bead" style="background:#42a5f5"></div>
    </div>
  </div>

  <!-- Contact bar -->
  <a href="https://wa.me/917022226706" target="_blank" style="text-decoration:none;">
    <div class="contact">
      <span class="contact-icon">📞</span>
      <div>
        <div class="contact-text">Contact Us</div>
        <div class="contact-number">70222 26706</div>
      </div>
      <div class="wa-badge">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="16" fill="#25D366"/>
          <path d="M23.5 8.5C21.7 6.7 19.4 5.7 17 5.7c-5 0-9.1 4.1-9.1 9.1 0 1.6.4 3.2 1.2 4.6L7.6 24.3l5.1-1.3c1.3.7 2.8 1.1 4.3 1.1 5 0 9.1-4.1 9.1-9.1 0-2.4-1-4.7-2.6-6.5zm-6.5 14c-1.4 0-2.7-.4-3.9-1l-.3-.2-2.9.8.8-2.8-.2-.3c-.8-1.2-1.2-2.6-1.2-4 0-4.2 3.4-7.6 7.6-7.6 2 0 3.9.8 5.4 2.2 1.4 1.4 2.2 3.3 2.2 5.4 0 4.2-3.4 7.5-7.5 7.5zm4.1-5.6c-.2-.1-1.3-.6-1.5-.7-.2-.1-.4-.1-.5.1-.2.2-.6.7-.8.9-.1.2-.3.2-.5.1-.7-.3-1.4-.7-2-1.2-.5-.5-1-1.1-1.4-1.8-.1-.2 0-.4.1-.5l.4-.4c.1-.1.2-.3.2-.4 0-.1 0-.3-.1-.4l-.7-1.7c-.2-.4-.4-.4-.5-.4h-.5c-.2 0-.4.1-.6.3-.7.7-.9 1.5-.5 2.4.5 1.1 1.5 2.3 2.6 3.1 1.2.9 2.7 1.5 4.1 1.5.3 0 .6 0 .9-.1.6-.2 1-.6 1.2-1.1.1-.3.1-.6 0-.9-.1-.1-.3-.2-.5-.3z" fill="white"/>
        </svg>
        <span class="wa-text">WhatsApp</span>
      </div>
    </div>
  </a>
</div>
</body>
</html>
